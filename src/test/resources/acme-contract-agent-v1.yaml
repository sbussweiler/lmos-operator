apiVersion: lmos.eclipse/v2
kind: Agent
metadata:
  name: contract-agent
  labels:
    version: "1.0.0"
spec:
  id: contract-agent
  description: This is the contract agent description
  supportedTenants:
    - acme
  supportedChannels:
    - web
    - ivr
  providedCapabilities:
    - id: view-contract
      name: view-contract
      version: 1.1.0
      description: Capability to view a contract
    - id: cancel-contract
      name: cancel-contract
      version: 1.1.0
      description: Capability to cancel a contract